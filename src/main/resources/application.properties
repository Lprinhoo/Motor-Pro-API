spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/motorprodb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:***REMOVED***}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

application.security.jwt.secret-key=${JWT_SECRET}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}

cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,file://,app://}

server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never