databaseChangeLog:
  # ChangeSet 1: Cria a tabela 'oficinas' primeiro, pois outras tabelas a referenciam
  - changeSet:
      id: 1
      author: yourname
      changes:
        - createTable:
            tableName: oficinas
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: nome
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: endereco
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: telefone
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

  # ChangeSet 2: Cria a tabela 'users' e sua chave estrangeira para 'oficinas'
  - changeSet:
      id: 2
      author: yourname
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: is_owner
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: oficina_id
                  type: UUID
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseTableName: users
            baseColumnNames: oficina_id
            referencedTableName: oficinas
            referencedColumnNames: id
            constraintName: fk_users_oficina

  # ChangeSet 3: Cria a tabela 'servicos' e sua chave estrangeira para 'oficinas'
  - changeSet:
      id: 3
      author: yourname
      changes:
        - createTable:
            tableName: servicos
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: nome
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: descricao
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: valor
                  type: DECIMAL(10, 2)
                  constraints:
                    nullable: false
              - column:
                  name: tempo_medio_em_minutos
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: oficina_id
                  type: UUID
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: servicos
            baseColumnNames: oficina_id
            referencedTableName: oficinas
            referencedColumnNames: id
            constraintName: fk_servicos_oficina